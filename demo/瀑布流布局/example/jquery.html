<script>
$(function(){
    waterfall();
    var dataInt={"data":[{"src":"images/28.jpg"},{"src":"images/29.jpg"},{"src":"images/30.jpg"},{"src":"images/31.jpg"},{"src":"images/32.jpg"}]};
    $(window).scroll(function(){
        if(checkScrollSlide){
           var oParent=$("#main");
            $.each(dataInt.data,function(key,value){
                var oBox=$("<div>").addClass("box").appendTo($("#main"));
                var oPic=$("<div>").addClass("pic").appendTo(oBox);
                var oImg=$("<img>").attr("src",$(value).attr("src")).appendTo(oPic);
            });
            waterfall();
        }
    })
});
    function waterfall(){
      var $boxs =  $("div#main>div"),
             boxW=$boxs.eq(0).outerWidth(),
              cols=Math.floor($(window).width()/boxW),
              arrH=[];
        $("#main").width(boxW*cols).css("margin","0 auto");
        $boxs.each(function(index,value){
            if(index<cols){
               arrH[index]=$boxs.eq(index).outerHeight();           /*width()<=innerWidth()<=outerWidth()<=outerWidth(true);*/
            }else{
                var minH=Math.min.apply(null,arrH);
                var minHindex= $.inArray(minH,arrH);
                $boxs.eq(index).css({
                    "position":"absolute",
                    "top":minH+"px",
                    "left":$boxs.eq(minHindex).position().left+"px"
                });
                arrH[minHindex]+=$boxs.eq(index).outerHeight();
                /*console.log($boxs.eq(index).outerHeight());*/
            }
        })
    }

//判断是否具备加载数据块的条件
function checkScrollSlide(){
    var $boxs =  $("div#main>div");
    var lastBoxH = $boxs.last().offset().top+Math.ceil($boxs.last().outerHeight()/2);
    var scrollTop = $(window).scrollTop();
    var height = $(window).height();
    return (scrollTop+height) > lastBoxH;
}
